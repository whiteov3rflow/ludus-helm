<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" role="img" aria-label="ludus-helm">
  <title>ludus-helm</title>
  <g transform="translate(12 12)">
    <!-- Cardinal spokes -->
    <g stroke="#00D4AA" stroke-width="2" stroke-linecap="round">
      <line x1="0" y1="-2" x2="0" y2="-9"/>
      <line x1="2" y1="0" x2="9" y2="0"/>
      <line x1="0" y1="2" x2="0" y2="9"/>
      <line x1="-2" y1="0" x2="-9" y2="0"/>
    </g>
    <!-- Cardinal nodes -->
    <circle cx="0" cy="-9.5" r="2.5" fill="#00D4AA"/>
    <circle cx="9.5" cy="0" r="2.5" fill="#00D4AA"/>
    <circle cx="0" cy="9.5" r="2.5" fill="#00D4AA"/>
    <circle cx="-9.5" cy="0" r="2.5" fill="#00D4AA"/>
    <!-- Center hub dot -->
    <circle cx="0" cy="0" r="2.5" fill="#00D4AA"/>
  </g>
</svg>
